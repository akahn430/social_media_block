<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Block</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Social Block</h1>
        <p id="siteSubtitle" class="subtitle">Loading…</p>
      </header>

      <section class="card controls">
        <button id="pickModeBtn" class="btn btn-mode">Click To Select</button>
        <button id="removeModeBtn" class="btn btn-mode">Click To Remove</button>
        <button id="saveBtn" class="btn btn-secondary">Save</button>
      </section>

      <section class="card controls">
        <button id="refreshBtn" class="btn btn-secondary">Refresh Elements</button>
        <button id="undoBtn" class="btn btn-secondary">Undo</button>
        <button id="resetBtn" class="btn btn-secondary">Reset Page</button>
        <button id="blockPageBtn" class="btn btn-secondary">Block This Page</button>
        <button id="hideSimilarBtn" class="btn btn-secondary">Hide Similar</button>
      </section>

      <section id="editPanel" class="card edit-panel collapsed">
        <div class="card-title-row">
          <h2 id="editTitle">Edit Element</h2>
          <button id="closeEditBtn" class="icon-btn" title="Close edit panel">✕</button>
        </div>
        <div class="edit-grid">
          <label>Background color <input id="bgColorInput" type="color" value="#ffffff" /></label>
          <label>Replace text <input id="textInput" type="text" placeholder="Enter replacement text" /></label>
          <label>Width
            <select id="widthPreset">
              <option value="">Default</option>
              <option value="full">Full Width</option>
              <option value="half">Half Width</option>
              <option value="fit">Fit Content</option>
            </select>
          </label>
          <label>Height
            <select id="heightPreset">
              <option value="">Default</option>
              <option value="auto">Auto</option>
              <option value="small">Small</option>
              <option value="medium">Medium</option>
              <option value="large">Large</option>
              <option value="screen">Full Screen</option>
            </select>
          </label>
          <label>Layout
            <select id="layoutPreset">
              <option value="">Default</option>
              <option value="block">Block</option>
              <option value="inline">Inline Block</option>
              <option value="flex">Flex</option>
              <option value="grid">Grid</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="card-title-row">
          <h2>Page Element Tree</h2>
          <span id="focusPath" class="hint">Select an element to see stack.</span>
        </div>
        <div id="treeContainer" class="tree"></div>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="sidepanel.js" type="module"></script>
  </body>
</html>
